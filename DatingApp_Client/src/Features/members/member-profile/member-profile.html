@if(MemberService.member() ; as Member){
<div class="flex flex-col gap-3">
  <div class="flex gap-2">
    <span class="font-semibold">Member Since:</span>
    <span>{{Member.created | date : 'longDate'}}</span>
  </div>
  <div class="flex gap-2">
    <span class="font-semibold">Last Active: </span>
    <span>{{Member.lastActive | timeAgo}}</span>
  </div>

  <h3 class="text-lg font-semibold text-primary">About {{Member.displayName}}</h3>
  @if(MemberService.EditMode()){
  <form #editForm="ngForm" (ngSubmit)="UpdateProfile()" class="flex flex-col w-full gap-4">
    <label for="floating-label">
      <span>Display Name</span>
      <input class="input w-full" name="displayName" [(ngModel)]="memberEdit.displayName" placeholder="DisplayName">
    </label>
    <label for="floating-label">
      <span>city</span>
      <input class="input w-full" name="city" [(ngModel)]="memberEdit.city" placeholder="city">
    </label>
    <label for="floating-label">
      <span>country</span>
      <input class="input w-full" name="country" [(ngModel)]="memberEdit.country" placeholder="country">
    </label>
    <label for="floating-label">
      <span>description</span>
      <textarea class="input w-full h-1/2" name="description" [(ngModel)]="memberEdit.description"
        placeholder="description"></textarea>
    </label>
    <div class="flex self-end">
      <button [disabled]="!editForm.dirty" type="submit" class="btn btn-success">Submit</button>
    </div>
  </form>
  }
  @else {
  <div>{{Member.description}}</div>
  }
</div>
}
