@if(!_MemberService.EditMode()){
@if(Photos(); as photos){
@if(photos.length > 0){
<div class="grid grid-cols-4 auto-rows-min gap-3 p-5 h-[65vh] overflow-auto">
  @for(photo of photos ; track photo.id){

  <div class="relative flex justify-center">
    <img src="{{photo.url}}" alt="photo of member" class="rounded-lg w-full">

    @if(_AccountService.currentUser()?.id == _MemberService.member()?.id){
    <app-star-button [disabled]="photo.url === _MemberService.member()?.imageUrl"
      [selected]="photo.url === _MemberService.member()?.imageUrl" (clickEvent)="setMainPhoto(photo)"
      class="absolute top-1 right-1" />

    <app-delete-button [disabled]="photo.url === _MemberService.member()?.imageUrl" (clickEvent)="deletePhoto(photo.id)"
      class="absolute top-1 left-1" />
    }


  </div>


  }
</div>
}
@else {
<p class="text-center text-gray-500"> Not Photo</p>
}
}
}
@else {
<app-image-upload (uploadFile)="onUploadImage($event)" [loading]="loading()" />
}
