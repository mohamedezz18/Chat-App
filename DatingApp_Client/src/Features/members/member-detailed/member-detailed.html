@if (_MemberService.member(); as member) {
<div class="flex gap-6">
  <div class="card bg-base-100 flex flex-col h-[86vh] w-1/4">
    <img [src]="member.imageUrl || '/user.png'" alt="Photo of member" class="rounded-full mx-10 mt-3 object-cover">
    <div class="card-body">
      <div class="flex flex-col items-center">
        <div class="flex text-2xl text-primary">
          {{member.displayName}}, {{member.dateOfBirth |agePipe}}
          @if (presenceService.onlineUsers().includes(member.id)) {
          <span class="status status-success status-xl absolute ml-3"></span>
          }
        </div>
        <div class="text-sm mt-1">
          {{member.city}}, {{member.country}}
        </div>

      </div>

      <div class="divider"></div>
      <ul class="rounded-box menu w-full text-xl">
        <li><a routerLink="profile">Profile</a></li>
        <li><a routerLink="photos">Photos</a></li>
        <li><a routerLink="messages">Messages</a></li>
      </ul>
    </div>
    <div class="card-actions justify-between gap-2 mb-3 px-2">
      <button routerLink="/members" class="btn btn-info flex-1">Go Back</button>
      <button
      (click)="LikesService.toggleLike(member.id)"
      [class.btn-error]="hasLiked()"
      [class.btn-success]="!hasLiked()"
      class="btn btn-primary flex-1">{{hasLiked() ? 'Remove Like' : 'Like'}}</button>
    </div>
  </div>

  <div class="card bg-base-100 w-3/4 p-6 ">

    <div class="flex justify-between items-center">
      <h3 class="card-title text-3xl text-primary">{{ Title() }}</h3>
      @if(isCurrentUser()){
      <button (click)="_MemberService.EditMode.set(!_MemberService.EditMode())" class="btn btn-outline btn-primary">
        {{_MemberService.EditMode() ? 'Cancel' : 'Edit'}}
      </button>
      }
    </div>

    <div class="divider"></div>
    <div class="h-full">
      <router-outlet></router-outlet>

    </div>
  </div>
</div>
}
@else{
<div>Member</div>
}
